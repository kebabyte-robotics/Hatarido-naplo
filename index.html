<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Task Assignment - Live Sync</title>
<script src="https://alcdn.msauth.net/browser/2.35.0/js/msal-browser.min.js"></script>
<style>
    :root {
        --bg-color: #050505;
        --card-bg: #141414;
        --text-color: #ffffff;
        --accent-blue: #00d2ff;
        --red: #ff4d4d;
        --green: #2ecc71;
        --yellow: #f1c40f;
        --grey: #333333;
    }

    body { 
        font-family: 'Segoe UI', Arial, sans-serif; 
        background-color: var(--bg-color); 
        color: var(--text-color);
        margin: 0; 
        padding: 20px; 
    }

    /* --- BEJELENTKEZŐ KÉPERNYŐ --- */
    #login-overlay {
        position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        background: var(--bg-color); 
        display: flex; align-items: center; justify-content: center; 
        z-index: 5000;
    }

    .login-box { 
        text-align: center; 
        padding: 50px; 
        border: 2px solid var(--accent-blue); 
        border-radius: 20px; 
        background: #0a0a0a;
        box-shadow: 0 0 30px rgba(0, 210, 255, 0.2);
    }

    .login-box h2 { font-weight: 900; letter-spacing: 3px; font-size: 2em; color: var(--accent-blue); margin-top: 0; }
    .btn-login { 
        background: var(--accent-blue); 
        color: #000; 
        font-size: 1.2em; 
        font-weight: 900;
        padding: 15px 30px; 
        border: none;
        border-radius: 8px;
        cursor: pointer;
        text-transform: uppercase;
        transition: 0.3s;
    }
    .btn-login:hover { transform: scale(1.05); box-shadow: 0 0 20px rgba(0, 210, 255, 0.4); }

    /* --- FŐOLDAL --- */
    h1 { 
        text-align: center; 
        font-weight: 900; 
        font-size: 2.5em;
        letter-spacing: 2px;
        color: var(--accent-blue);
        text-transform: uppercase;
        margin-bottom: 30px;
    }

    .task-list { 
        display: grid; 
        grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); 
        gap: 15px; 
        padding: 10px;
    }

    .task-card { 
        background: var(--card-bg);
        aspect-ratio: 5 / 3;
        padding: 15px; 
        border-radius: 8px; 
        border-left: 12px solid var(--grey);
        display: flex; 
        flex-direction: column;
        justify-content: space-between;
        box-sizing: border-box;
        transition: 0.2s;
        border-top: 1px solid #222;
    }

    .status-urgent { border-left-color: var(--red) !important; background: #1a0a0a; }
    .status-done { border-left-color: var(--green) !important; opacity: 0.4; }
    .status-progress { border-left-color: var(--yellow) !important; background: #1a1a0a; }

    .task-info b { font-size: 1.1em; font-weight: 900; display: block; text-transform: uppercase; margin-bottom: 5px; }
