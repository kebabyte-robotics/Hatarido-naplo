<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Task Assignment - Live Sync</title>
<script src="https://alcdn.msauth.net/browser/2.35.0/js/msal-browser.min.js"></script>
<style>

        :root {

            --bg-color: #050505;

            --card-bg: #141414;

            --text-color: #ffffff;

            --accent-blue: #00d2ff;

            --red: #ff4d4d;

            --green: #2ecc71;

            --yellow: #f1c40f;

            --grey: #333333;

        }
 
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg-color); color: var(--text-color); margin: 0; padding: 20px; }

        /* Login Screen */

        #login-overlay {

            position: fixed; top: 0; left: 0; width: 100%; height: 100%;

            background: var(--bg-color); display: flex; align-items: center; justify-content: center; z-index: 5000;

        }

        .login-box { text-align: center; padding: 40px; border: 2px solid var(--accent-blue); border-radius: 20px; }

        .login-box h2 { font-weight: 900; letter-spacing: 2px; }
 
        h1 { text-align: center; font-weight: 900; font-size: 2.5em; color: var(--accent-blue); text-transform: uppercase; }
 
        .task-list { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 15px; }

        .task-card { 

            background: var(--card-bg); aspect-ratio: 5 / 3; padding: 15px; border-radius: 8px; 

            border-left: 12px solid var(--grey); display: flex; flex-direction: column; 

            justify-content: space-between; box-sizing: border-box; border-top: 1px solid #222;

        }
 
        .status-urgent { border-left-color: var(--red) !important; }

        .status-done { border-left-color: var(--green) !important; opacity: 0.4; }

        .status-progress { border-left-color: var(--yellow) !important; }
 
        .task-info b { font-size: 1.1em; font-weight: 900; display: block; text-transform: uppercase; }

        .worker-status { color: var(--yellow); font-size: 0.75em; font-weight: 900; margin-top: 5px; }
 
        .btn-group { display: flex; gap: 5px; margin-top: 10px; }

        button { padding: 8px 12px; border-radius: 4px; border: none; font-weight: 900; cursor: pointer; text-transform: uppercase; font-size: 0.7em; }

        .btn-login { background: var(--accent-blue); color: #000; font-size: 1em; padding: 15px 30px; }

        .btn-work { background: var(--yellow); color: #000; }

        .btn-done { background: var(--green); color: #000; }

        .btn-del { background: transparent; color: #555; border: 1px solid #333; }
 
        .fab { position: fixed; bottom: 30px; right: 30px; width: 60px; height: 60px; background: var(--accent-blue); border-radius: 50%; font-size: 30px; font-weight: 900; border: none; cursor: pointer; }
 
        /* Modal */

        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); align-items: center; justify-content: center; z-index: 2000; }

        .modal-content { background: #111; padding: 30px; border-radius: 15px; width: 300px; display: flex; flex-direction: column; gap: 15px; border: 2px solid #333; }

        input { background: #222; border: 1px solid #444; padding: 12px; color: #fff; border-radius: 6px; font-weight: 900; }

        input[type="date"]::-webkit-calendar-picker-indicator { filter: invert(1); }
</style>
</head>
<body>
 
<div id="login-overlay">
<div class="login-box">
<h2>TASK ASSIGNMENT</h2>
<p>Please sign in to access the shared board</p>
<button class="btn-login" onclick="login()">LOGIN WITH MICROSOFT</button>
</div>
</div>
 
<div class="container" id="main-app" style="display:none;">
<h1>TASK ASSIGNMENT</h1>
<div id="taskList" class="task-list"></div>
</div>
 
<button class="fab" onclick="openModal()">+</button>
 
<div id="taskModal" class="modal">
<div class="modal-content">
<h2 style="margin:0; font-weight:900;">NEW TASK</h2>
<input type="text" id="taskTitle" placeholder="Task description">
<input type="date" id="taskDeadline">
<input type="text" id="taskWorker" placeholder="Assignee">
<button style="background: var(--accent-blue); color:#000;" onclick="addTask()">SAVE & SYNC</button>
<button onclick="closeModal()" style="background:transparent; color:#555;">CANCEL</button>
</div>
</div>
 
<script>

    // --- MICROSOFT AUTH CONFIG ---

    const msalConfig = {

        auth: {

            clientId: "3b333cb2-a15d-48af-b230-8eb6e66deaad",

            authority: "https://login.microsoftonline.com/common"

        }

    };

    const msalInstance = new msal.PublicClientApplication(msalConfig);
 
    async function login() {

        try {

            await msalInstance.loginPopup();

            document.getElementById('login-overlay').style.display = 'none';

            document.getElementById('main-app').style.display = 'block';

            startSync(); // Adatok betöltése belépés után

        } catch (err) { alert("Login failed"); }

    }
 
    // --- SHARED STORAGE LOGIC ---

    // Ahhoz, hogy mindenkinél ugyanaz legyen, egy API-t kellene hívni. 

    // Itt egy szimuláció: a valóságban ide egy Firebase vagy JSONbin URL kell.

    let tasks = [];
 
    async function startSync() {

        // Ez a függvény töltené le az adatokat a szerverről

        // loadFromCloud(); 

        renderTasks();

        // 5 másodpercenként frissíthetne: setInterval(loadFromCloud, 5000);

    }
 
    function openModal() { document.getElementById('taskModal').style.display = 'flex'; }

    function closeModal() { document.getElementById('taskModal').style.display = 'none'; }
 
    function addTask() {

        const title = document.getElementById('taskTitle').value;

        const deadline = document.getElementById('taskDeadline').value;

        const worker = document.getElementById('taskWorker').value;

        if (!title || !deadline) return;

        const newTask = { id: Date.now(), title, deadline, worker, completed: false, inProgress: false };

        tasks.push(newTask);

        // Itt küldenénk el a szerverre: syncToCloud(tasks);

        saveAndRender();

        closeModal();

    }
 
    function toggleProgress(id) {

        tasks = tasks.map(t => t.id === id ? { ...t, inProgress: !t.inProgress, completed: false } : t);

        saveAndRender();

    }
 
    function toggleDone(id) {

        tasks = tasks.map(t => t.id === id ? { ...t, completed: !t.completed, inProgress: false } : t);

        saveAndRender();

    }
 
    function deleteTask(id) {

        tasks = tasks.filter(t => t.id !== id);

        saveAndRender();

    }
 
    function saveAndRender() {

        // Most még localstorage-ba mentünk, de ide jön a "Cloud Sync"

        localStorage.setItem('sharedTasks', JSON.stringify(tasks));

        renderTasks();

    }
 
    function renderTasks() {

        const list = document.getElementById('taskList');

        list.innerHTML = '';

        tasks.sort((a, b) => new Date(a.deadline) - new Date(b.deadline));
 
        tasks.forEach(task => {

            const diffDays = Math.ceil((new Date(task.deadline) - new Date().setHours(0,0,0,0)) / (1000*60*60*24));

            let statusClass = "status-default";

            if (task.completed) statusClass = "status-done";

            else if (diffDays <= 5 && diffDays >= 0) statusClass = "status-urgent";

            else if (task.inProgress) statusClass = "status-progress";
 
            list.innerHTML += `
<div class="task-card ${statusClass}">
<div class="task-info">
<b>${task.title}</b>
<span>📅 DUE: ${task.deadline}</span>

                        ${task.inProgress ? `<div class="worker-status">👤 ${task.worker || 'Active'}</div>` : ''}
</div>
<div class="btn-group">
<button class="btn-work" onclick="toggleProgress(${task.id})">${task.inProgress ? 'STOP' : 'START'}</button>
<button class="btn-done" onclick="toggleDone(${task.id})">DONE</button>
<button class="btn-del" onclick="deleteTask(${task.id})">✕</button>
</div>
</div>`;

        });

    }
 
    // Ha már volt belépve

    if (msalInstance.getAllAccounts().length > 0) {

        document.getElementById('login-overlay').style.display = 'none';

        document.getElementById('main-app').style.display = 'block';

        startSync();

    }
</script>
</body>
</html>
